# The pipeline. Two things it does, deliberately DECOUPLED:
#
#   1. Health — every PR runs verify; every push to main runs verify AND the full e2e suite
#      against a GitHub Pages-shaped build (BASE_PATH=/darwinlab), in parallel. Merging proves
#      main is shippable. It does NOT publish anything.
#
#   2. Deploy — publishing to Pages happens ONLY on a manual run (workflow_dispatch), i.e. when
#      someone runs `make deploy`. That run re-does the whole bar fresh — verify + e2e — and
#      ships the exact bytes the e2e job just exercised, so what goes live is what was tested at
#      that SHA, not a stale green from an earlier merge.
#
# So main and the live site diverge by design: merge freely, publish when ready. `make deploy`
# shows you that gap (last-deployed SHA vs current main) before it triggers this.
#
# Playwright's browser download (~150MB) is cached keyed on the lockfile, so a run without
# dependency changes skips it entirely.
name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # The vitest "client" project runs component specs in real Chromium, so browsers are
      # needed for the UNIT suite too, not just Playwright e2e. The download is cached on the
      # lockfile hash — any dependency change (incl. Playwright itself) refreshes it.
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install --with-deps chromium
      - run: npm run check
      - run: npm run lint
      - run: npm run test:unit -- --run
      - run: npm run build

  # e2e runs against the build exactly as Pages will serve it — under /darwinlab — so a
  # base-path regression (an absolute URL escaping the base) fails here, not in production.
  # The suite deliberately does NOT gate PRs (they get check/lint/unit/build); it runs on every
  # push to main (the health signal) and on a deploy dispatch (the gate). No `needs: verify`:
  # the two gates are independent, so they run in PARALLEL, and a deploy requires BOTH.
  e2e:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      BASE_PATH: /darwinlab
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7
      # Only carry the artifact forward when this run will actually publish it (a deploy
      # dispatch) — a plain push-to-main runs e2e for the health signal and stops there.
      - uses: actions/upload-pages-artifact@v3
        if: github.event_name == 'workflow_dispatch'
        with:
          path: build/

  # Ships the artifact the e2e job uploaded — no rebuild, so what deploys is what was tested.
  # Gated on BOTH parallel jobs AND on being a manual dispatch: a merge to main never reaches
  # Pages; only `make deploy` (workflow_dispatch on main) does.
  deploy:
    needs: [verify, e2e]
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Idempotent; lets the pipeline bootstrap Pages itself on a fresh repo or fork.
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - id: deployment
        uses: actions/deploy-pages@v4
