# The release pipeline: verify on every PR and push to main; on main, additionally run the
# full e2e suite against a GitHub Pages-shaped build (BASE_PATH=/darwinlab) IN PARALLEL with
# verify — the two are independent gates — and deploy only when BOTH are green, shipping the
# exact bytes the e2e suite just exercised. Playwright's browser download (~150MB) is cached
# keyed on the lockfile, so a run without dependency changes skips it entirely.
name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # The vitest "client" project runs component specs in real Chromium, so browsers are
      # needed for the UNIT suite too, not just Playwright e2e. The download is cached on the
      # lockfile hash — any dependency change (incl. Playwright itself) refreshes it.
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install --with-deps chromium
      - run: npm run check
      - run: npm run lint
      - run: npm run test:unit -- --run
      - run: npm run build

  # e2e runs against the build exactly as Pages will serve it — under /darwinlab — so a
  # base-path regression (an absolute URL escaping the base) fails here, not in production.
  # The suite deliberately does NOT gate PRs (they get check/lint/unit/build); it gates the
  # deploy instead. On success the build the webServer produced becomes the Pages artifact.
  # No `needs: verify`: the two gates are independent, so they run in PARALLEL and the deploy
  # below requires BOTH — same bar, roughly half the wall-clock.
  e2e:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      BASE_PATH: /darwinlab
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7
      - uses: actions/upload-pages-artifact@v3
        if: github.ref == 'refs/heads/main'
        with:
          path: build/

  # Ships the artifact the e2e job uploaded — no rebuild, so what deploys is what was tested.
  # Gated on BOTH parallel jobs: nothing reaches Pages that didn't pass the whole bar.
  deploy:
    needs: [verify, e2e]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Idempotent; lets the pipeline bootstrap Pages itself on a fresh repo or fork.
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - id: deployment
        uses: actions/deploy-pages@v4
