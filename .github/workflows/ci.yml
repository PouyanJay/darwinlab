# The release pipeline: verify on every PR and push to main; on main, additionally run the
# full e2e suite against a GitHub Pages-style build (BASE_PATH=/darwinlab) and, only if that
# is green, deploy the same-shaped build to Pages.
name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # The vitest "client" project runs component specs in real Chromium, so browsers are
      # needed for the UNIT suite too, not just Playwright e2e.
      - run: npx playwright install --with-deps chromium
      - run: npm run check
      - run: npm run lint
      - run: npm run test:unit -- --run
      - run: npm run build

  # e2e runs against the build exactly as Pages will serve it — under /darwinlab — so a
  # base-path regression (an absolute URL escaping the base) fails here, not in production.
  e2e:
    needs: verify
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      BASE_PATH: /darwinlab
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7

  deploy:
    needs: e2e
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      BASE_PATH: /darwinlab
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/
      - id: deployment
        uses: actions/deploy-pages@v4
