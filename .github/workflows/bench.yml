# Nightly science watch: re-measure converged survival headlessly and fail the run if the
# honest finding drifts — Direction must stay the only sense that clearly pays, and every
# world must stay near its measured baseline (scripts/bench.ts holds the numbers and the
# exit-code contract). Scheduled, so it never blocks a PR; a red run here IS the drift report.
#
# Note: GitHub disables cron workflows after ~60 days without repository activity. If the
# project goes quiet, re-enable it from the Actions tab or run it via workflow_dispatch —
# especially after any change to src/lib/engine/ or a toolchain bump.
name: Survival bench

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run bench:survival
