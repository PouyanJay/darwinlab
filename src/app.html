<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<!--
			Resolve the theme BEFORE the first paint. The app is client-rendered, so if we waited for
			onMount to stamp data-theme, a user would see a flash of the wrong palette on every load.
			This must stay in <head>, ahead of any styles.
			Kept in sync with state/theme.svelte.ts (same storage key, same fallback).
			Dark is the default; only a saved choice flips us to light (the OS preference does not).
		-->
		<script>
			(() => {
				try {
					const saved = localStorage.getItem('darwinlab:theme');
					document.documentElement.dataset.theme = saved === 'light' ? 'light' : 'dark';
				} catch {
					document.documentElement.dataset.theme = 'dark';
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
